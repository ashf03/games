<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Metronome</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      color: #ffffff;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      padding: 20px 0;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 300;
      margin: 0;
      letter-spacing: 2px;
      color: #ffffff;
    }

    .metronome-container {
      background: #1a1a1a;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      border: 1px solid #333;
    }

    .options-btn {
      color: #ffffff;
      font-size: 20px;
      position: absolute;
      top: 20px;
      right: 20px;
      cursor: pointer;
      transition: transform 0.3s ease;
      padding: 8px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
    }

    .options-btn:hover {
      transform: rotate(90deg);
      background: rgba(255, 255, 255, 0.2);
    }

    .options {
      position: absolute;
      top: 60px;
      right: 20px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 12px;
      padding: 0;
      max-height: 0;
      overflow: hidden;
      transition: all 0.3s ease;
      min-width: 250px;
    }

    .options-active {
      max-height: 200px !important;
      padding: 20px !important;
    }

    .options label {
      display: block;
      margin: 15px 0;
      font-size: 14px;
      color: #cccccc;
    }

    .counter {
      padding: 40px 20px;
      text-align: center;
      background: #111111;
      position: relative;
      border-bottom: 1px solid #333;
    }

    .dot {
      width: 16px;
      height: 16px;
      display: inline-block;
      margin: 0 8px;
      background: #444;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }

    .dot:hover {
      background: #666;
      transform: scale(1.1);
    }

    .dot.active {
      background: #ffffff;
      border-color: #ffffff;
    }

    .controls {
      padding: 30px;
      text-align: center;
      background: #1a1a1a;
    }

    .control-group {
      margin-bottom: 25px;
    }

    .control-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #cccccc;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .bpm-control {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .bpm-control i {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #333;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
    }

    .bpm-control i:hover {
      background: #555;
    }

    .bpm-input {
      width: 80px;
      padding: 8px 12px;
      background: #333;
      border: 1px solid #555;
      border-radius: 8px;
      color: #ffffff;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
    }

    .bpm-input:focus {
      outline: none;
      border-color: #777;
    }

    .beat-input {
      width: 60px;
      padding: 8px 12px;
      background: #333;
      border: 1px solid #555;
      border-radius: 8px;
      color: #ffffff;
      text-align: center;
      font-size: 14px;
    }

    .beat-input:focus {
      outline: none;
      border-color: #777;
    }

    .timer-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 25px;
    }

    .checkbox-container {
      position: relative;
    }

    input[type="checkbox"] {
      display: none;
    }

    input[type="checkbox"] + label {
      width: 20px;
      height: 20px;
      border: 2px solid #555;
      border-radius: 4px;
      display: inline-block;
      cursor: pointer;
      position: relative;
      transition: all 0.2s ease;
    }

    input[type="checkbox"]:checked + label {
      background: #ffffff;
      border-color: #ffffff;
    }

    input[type="checkbox"]:checked + label:after {
      content: "✓";
      position: absolute;
      color: #000;
      font-size: 12px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .timer-input {
      width: 60px;
      padding: 8px 12px;
      background: #333;
      border: 1px solid #555;
      border-radius: 8px;
      color: #ffffff;
      text-align: center;
      font-size: 14px;
    }

    .button-group {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 100px;
    }

    .tap-btn {
      background: #333;
      color: #ffffff;
      border: 1px solid #555;
    }

    .tap-btn:hover {
      background: #444;
    }

    .play-btn {
      background: #ffffff;
      color: #000000;
    }

    .play-btn:hover {
      background: #e0e0e0;
    }

    .play-btn[data-what="pause"] {
      background: #333;
      color: #ffffff;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: #333;
      outline: none;
      margin: 8px 0;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      border: none;
    }

    @media (max-width: 768px) {
      .container {
        padding: 10px;
      }
      
      header h1 {
        font-size: 2rem;
      }
      
      .controls {
        padding: 20px;
      }
      
      .button-group {
        flex-direction: column;
      }
      
      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>METRONOME</h1>
    </header>

    <section class="metronome-container">
      <div class="counter"></div>
      
      <i class="fa fa-cog options-btn"></i>

      <div class="controls">
        <div class="control-group">
          <label>BPM</label>
          <div class="bpm-control">
            <i class="fa fa-minus bpm-minus"></i>
            <input type="text" value="60" class="bpm-input" />
            <i class="fa fa-plus bpm-plus"></i>
          </div>
        </div>

        <div class="control-group">
          <label>Beat</label>
          <input type="text" value="4" class="ts-top beat-input" />
        </div>

        <div class="timer-section">
          <div class="checkbox-container">
            <input type="checkbox" id="timer-check" />
            <label for="timer-check"></label>
          </div>
          <span>Timer</span>
          <input type="text" value="60" class="timer timer-input" />
        </div>

        <div class="button-group">
          <button class="btn tap-btn">Tap</button>
          <button class="btn play-btn">Play</button>
        </div>
      </div>
      
      <div class="options">
        <label>Off Beat Pitch
          <input type="range" min="0" max="500" value="200" class="beat-range" />
        </label>
        <label>Accent Pitch
          <input type="range" min="0" max="500" value="380" class="accent-range" />
        </label>
      </div>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script>
    window.AudioContext = window.AudioContext || window.webkitAudioContext;
    var context = new AudioContext();
    var timer, noteCount, counting, accentPitch = 380, offBeatPitch = 200;
    var delta = 0;
    var curTime = 0.0;

    $(document).ready(function() {
      $(".ts-top").trigger("change");
    });

    function schedule() {
      while(curTime < context.currentTime + 0.1) {
        playNote(curTime);
        updateTime();
      }
      timer = window.setTimeout(schedule, 0.1);
    }

    function updateTime() {
      curTime += 60.0 / parseInt($(".bpm-input").val(), 10);
      noteCount++;
    }

    function playNote(t) {
      var note = context.createOscillator();

      if(noteCount == parseInt($(".ts-top").val(), 10))
        noteCount = 0;

      if($(".counter .dot").eq(noteCount).hasClass("active"))
        note.frequency.value = accentPitch;
      else
        note.frequency.value = offBeatPitch;

      note.connect(context.destination);
      note.start(t);
      note.stop(t + 0.05);

      $(".counter .dot").attr("style", "");
      $(".counter .dot").eq(noteCount).css({
        transform: "translateY(-10px)",
        background: "#ffffff"
      });
    }

    function countDown() {
      var t = $(".timer");

      if(parseInt(t.val(), 10) > 0 && counting === true) {
        t.val(parseInt(t.val(), 10) - 1);
        window.setTimeout(countDown, 1000);
      } else {
        $(".play-btn").click();
        t.val(60);
      }
    }

    $(".tap-btn").click(function() {
      var d = new Date();
      var temp = parseInt(d.getTime(), 10);
      $(".bpm-input").val(Math.ceil(60000 / (temp - delta)));
      delta = temp;
    });

    $(".bpm-minus, .bpm-plus").click(function() {
      if($(this).hasClass("bpm-minus"))
        $(".bpm-input").val(parseInt($(".bpm-input").val(), 10) - 1);
      else
        $(".bpm-input").val(parseInt($(".bpm-input").val(), 10) + 1);
    });

    $(".beat-range, .accent-range").change(function() {
      if($(this).hasClass("beat-range"))
        offBeatPitch = $(this).val();
      else
        accentPitch = $(this).val();
    });

    $(document).on("click", ".counter .dot", function() {
      $(this).toggleClass("active");
    });

    $(".options-btn").click(function() {
      $(".options").toggleClass("options-active");
    });

    $(".ts-top").on("change", function() {
      var _counter = $(".counter");
      _counter.html("");

      for(var i = 0; i < parseInt($(".ts-top").val(), 10); i++) {
        var temp = document.createElement("div");
        temp.className = "dot";

        if(i === 0)
          temp.className += " active";

        _counter.append(temp);
      }
    });

    $(".play-btn").click(function() {
      if($(this).data("what") === "pause") {
        counting = false;
        window.clearInterval(timer);
        $(".counter .dot").attr("style", "");
        $(this).data("what", "play").attr("style","").text("Play");
      } else {
        if($("#timer-check").is(":checked")) {
          counting = true;
          countDown();
        }
        
        curTime = context.currentTime;
        noteCount = parseInt($(".ts-top").val(), 10);
        schedule();

        $(this).data("what", "pause").css({
          background: "#333",
          color: "#fff"
        }).text("Stop");
      }
    });
  </script>
</body>
</html>
